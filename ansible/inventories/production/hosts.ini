[windows]
winserver01 ansible_host=18.138.224.111

[controller]
localhost ansible_connection=local

[windows:vars]
# Override ansible_user per host when the Windows administrator account differs.
ansible_user=Administrator
ansible_password="{{ lookup('ansible.builtin.env', 'WINDOWS_ANSIBLE_PASSWORD') }}"
ansible_connection=winrm
ansible_port=5985
ansible_winrm_scheme=http
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_operation_timeout_sec=120
ansible_winrm_read_timeout_sec=180
